<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Wordsearch</title>

<style>
html, body {
  margin: 0;
  height: 100%;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #1a1a1a, #0c0d10);
  color: #ffffff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}
.container {
  text-align: center;
}
h1 {
  font-size: 56px;
  margin-bottom: 12px;
  color: #E60000;
}
p {
  font-size: 18px;
  color: #cfd5d9;
  margin-bottom: 28px;
}
img {
  width: 300px;
  height: 300px;
  background: #ffffff;
  border-radius: 20px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.55);
}
.debug {
  margin-top: 16px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>
  <div class="container">
    <h1>Team Wordsearch</h1>
    <p>Scan the QR code to join the game</p>

    <!-- ✅ THIS MUST BE AN IMG TAG -->
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://saturncapricornsquid.github.io/CSANDLCA/play.html"
      alt="QR code to join the game"
    >

    <!-- Visible debug text so we know the body rendered -->
    <div class="debug">host.html loaded correctly</div>
  </div>
</body>
</html>
