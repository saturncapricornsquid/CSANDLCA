<!DOCTYPE html>

<style>
html, body {

body {

  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* LANDING */
#landing {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

  font-size: 42px;
  color: #E60000;
  margin-bottom: 24px;
}

#landing button {
  padding: 16px 28px;
  font-size: 18px;
  font-weight: 800;
  border-radius: 32px;
  border: none;
  background: #E60000;
  color: #ffffff;
  cursor: pointer;
}

/* GAME */
#game {
  display: none;
  padding: 20px;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(8, 40px);

  margin-top: 20px;
}

.cell {
  width: 40px;
  height: 40px;
  background: #101217;
  border: 1px solid #24262b;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
}
</style>
</head>

</div>

<!-- GAME -->

</div>
