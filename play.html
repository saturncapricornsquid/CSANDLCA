<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Wordsearch</title>

<style>
/* ===== GLOBAL ===== */
html, body {
  margin: 0;
  height: 100%;
}

body {
  background: radial-gradient(circle at top, #1a1a1a, #0c0d10);
  color: #ffffff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* ===== LANDING ===== */
#landing {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#landing .box {
  text-align: center;
  width: 300px;
}

#landing h1 {
  font-size: 42px;
  color: #E60000;
  margin-bottom: 24px;
}

#landing button {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: 800;
  border-radius: 32px;
  border: none;
  background: #E60000;
  color: #ffffff;
  cursor: pointer;
}

/* ===== GAME ===== */
#game {
  display: none;
  padding: 16px;
  max-width: 600px;
  margin: 0 auto;
}

.card {
  background: #14161a;
  border: 1px solid #24262b;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 12px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 4px;
}

.cell {
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #101217;
  border: 1px solid #24262b;
  font-weight: 800;
  user-select: none;
}
</style>
</head>

<body>

<!-- LANDING SCREEN -->
<div id="landing">
  <div class="box">
    <h1>Team Wordsearch</h1>
    <button id="enterBtn">Enter Game</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game">
  <div class="card">
    <strong>Wordsearch</strong>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
/* ===== SAFE, MINIMAL JS ===== */

const landing = document.getElementById("landing");
const game = document.getElementById("game");
const grid = document.getElementById("grid");
const enterBtn = document.getElementById("enterBtn");

enterBtn.addEventListener("click", () => {
  landing.style.display = "none";
  game.style.display = "block";
  buildGrid();
});

function buildGrid() {
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  grid.innerHTML = "";

  for (let i = 0; i < 100; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.textContent = letters[Math.floor(Math.random() * letters.length)];
    grid.appendChild(cell);
  }
}
</script>

</body>
</html>
``
