<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Team Wordsearch</title>

<style>
html, body {
  margin: 0;
  height: 100%;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #1a1a1a, #0c0d10);
  color: #ffffff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* LANDING */
#landing {
  text-align: center;
  max-width: 360px;
}
#landing h1 {
  font-size: 42px;
  margin-bottom: 32px;
  color: #E60000; /* Vodafone red */
}
#landing button {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: 800;
  border-radius: 32px;
  border: none;
  background: #E60000;
  color: #ffffff;
  cursor: pointer;
}

/* GAME */
#game {
  display: none;
  padding: 16px;
  width: 100%;
  max-width: 600px;
}
.card {
  background: #14161a;
  border: 1px solid #24262b;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(15, 36px);
  justify-content: center;
}
.cell {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #24262b;
  background: #101217;
  font-weight: 800;
  user-select: none;
}
</style>
</head>

<body>

<!-- LANDING SCREEN -->
<div id="landing">
  <h1>Team Wordsearch</h1>
  <button onclick="startGame()">Enter Game</button>
</div>

<!-- GAME SCREEN -->
<div id="game">
  <div class="card">
    <strong>Wordsearch</strong>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
/* ENTER GAME */
function startGame() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  init();
  render();
}

/* BASIC WORDSEARCH */
const WORDS = ["CORE","SITETRACKER","ALLOCATION","NCT","DELIVERY","LCA","CRQ","AUDIT"];
const SIZE = 15;
let board = [];

function init() {
  board = Array.from({length: SIZE}, () =>
    Array.from({length: SIZE}, () => '')
  );
  WORDS.forEach(w => placeWord(w));
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (!board[r][c]) {
        board[r][c] = String.fromCharCode(65 + Math.floor(Math.random() * 26));
      }
    }
  }
}

function placeWord(word) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (let t = 0; t < 400; t++) {
    const [dr, dc] = dirs[Math.floor(Math.random() * dirs.length)];
    const r0 = Math.floor(Math.random() * SIZE);
    const c0 = Math.floor(Math.random() * SIZE);
    let ok = true;
    for (let i = 0; i < word.length; i++) {
      const r = r0 + dr * i;
      const c = c0 + dc * i;
