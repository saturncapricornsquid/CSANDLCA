<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Team Wordsearch</title>

<style>
:root{
  --bg:#0c0d10;
  --panel:#14161a;
  --border:#24262b;
  --red:#E60000;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg);
  color:#fff;
  font-family:system-ui,Segoe UI,Roboto,Arial;
}

/* WELCOME */
#welcome{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at top, #1a1a1a, #0c0d10);
  z-index:10;
}
.welcome-card{
  text-align:center;
  max-width:360px;
}
.welcome-card h1{
  font-size:36px;
  margin-bottom:10px;
  color:var(--red);
}
.welcome-card p{
  color:#cfd5d9;
  font-size:16px;
  margin-bottom:30px;
}
#welcome button{
  width:100%;
  background:var(--red);
  border:none;
  padding:16px;
  border-radius:32px;
  font-weight:800;
  font-size:16px;
  color:#fff;
}

/* GAME */
#game{
  display:none;
  padding:16px;
}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(15,36px);
}
.cell{
  width:36px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--border);
  background:#101217;
  font-weight:800;
  user-select:none;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome">
  <div class="welcome-card">
    <h1>Welcome</h1>
    <p>Welcome to the Team Wordsearch</p>
    <button id="enterBtn">Enter Game</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="card">
    <strong>Teams</strong>
    <p>Create your team and add players</p>
    <!-- placeholder for team/player UI -->
  </div>

  <div class="card">
    <strong>Wordsearch</strong>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
/* ENTER GAME */
document.getElementById('enterBtn').onclick=()=>{
  document.getElementById('welcome').style.display='none';
  document.getElementById('game').style.display='block';
  init();
  render();
};

/* BASIC WORDSEARCH */
const WORDS=["CORE","SITETRACKER","ALLOCATION","NCT","DELIVERY","LCA","CRQ","AUDIT"];
const SIZE=15;
let board=[];

function init(){
  board=Array.from({length:SIZE},()=>Array.from({length:SIZE},()=>''));  
  WORDS.forEach(w=>placeWord(w));
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)
    if(!board[r][c])board[r][c]=String.fromCharCode(65+Math.random()*26);
}

function placeWord(word){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let t=0;t<400;t++){
    const [dr,dc]=dirs[Math.floor(Math.random()*dirs.length)];
    const r0=Math.floor(Math.random()*SIZE);
    const c0=Math.floor(Math.random()*SIZE);
    let ok=true,cells=[];
    for(let i=0;i<word.length;i++){
      const r=r0+dr*i,c=c0+dc*i;
      if(r<0||c<0||r>=SIZE||c>=SIZE){ok=false;break;}
      cells.push([r,c]);
    }
    if(ok){cells.forEach((p,i)=>board[p[0]][p[1]]=word[i]);return;}
  }
}

function render(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const d=document.createElement('div');
    d.className='cell';
    d.textContent=board[r][c];
    g.appendChild(d);
  }
}
</script>

</body>
</html>
``
