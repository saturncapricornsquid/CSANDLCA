<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Wordsearch</title>

<style>
html, body {
  margin: 0;
  height: 100%;
}

body {
  background: radial-gradient(circle at top, #1a1a1a, #0c0d10);
  color: #ffffff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* LANDING */
#landing {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#landing h1 {
  font-size: 42px;
  color: #E60000;
  margin-bottom: 24px;
}

#landing button {
  padding: 16px 28px;
  font-size: 18px;
  font-weight: 800;
  border-radius: 32px;
  border: none;
  background: #E60000;
  color: #ffffff;
  cursor: pointer;
}

/* GAME */
#game {
  display: none;
  padding: 16px;
  max-width: 900px;
  margin: 0 auto;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

button, select {
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  font-weight: 700;
}

.grid {
  display: grid;
  grid-template-columns: repeat(10, 36px);
  gap: 4px;
  margin-top: 12px;
}

.cell {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #101217;
  border: 1px solid #24262b;
  font-weight: 800;
  user-select: none;
}

.cell.selected {
  background: #333;
}

.cell.found {
  background: #E60000;
}

.panel {
  margin-top: 12px;
  display: flex;
  gap: 20px;
}

.panel div {
  flex: 1;
}

.leaderboard div {
  margin: 4px 0;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
  <div style="text-align:center">
    <h1>Team Wordsearch</h1>
    <button onclick="enterGame()">Enter Game</button>
  </div>
</div>

<!-- GAME -->
<div id="game">

  <div class="topbar">
    <div>
      <button onclick="addTeam()">Add Team</button>
      <select id="activeTeam"></select>
    </div>
    <strong id="activeScore">Score: 0</strong>
  </div>

  <div class="grid" id="grid"></div>

  <div class="panel">
    <div>
      <h3>Words</h3>
      <div id="wordList"></div>
    </div>
    <div>
      <h3>Leaderboard</h3>
      <div class="leaderboard" id="leaderboard"></div>
    </div>
  </div>

</div>

<script>
/* ===== GAME DATA ===== */
const WORDS = ["CORE","LCA","CRQ","AUDIT"];
const SIZE = 10;
const board = [];
const placed = [];
let selecting = false;
let selectedCells = [];

const teams = [];
let activeTeamIndex = 0;

/* ===== ENTER GAME ===== */
function enterGame() {
  document.getElementById("landing").style.display = "none";
  document.getElementById("game").style.display = "block";
  init();
  renderGrid();
  renderWords();
}

/* ===== TEAM LOGIC ===== */
function addTeam() {
  const name = prompt("Team name?");
  if (!name) return;
  teams.push({ name, score: 0 });
  updateTeamSelect();
}

function updateTeamSelect() {
  const sel = document.getElementById("activeTeam");
  sel.innerHTML = "";
  teams.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i;
    o.textContent = t.name;
    sel.appendChild(o);
  });
  sel.onchange = e => {
    activeTeamIndex = +e.target.value;
    updateScore();
  };
  updateScore();
  renderLeaderboard();
}

function updateScore() {
  if (!teams.length) {
    document.getElementById("activeScore").textContent = "Score: 0";
  } else {
    document.getElementById("activeScore").textContent =
      `Score: ${teams[activeTeamIndex].score}`;
  }
}

/* ===== INIT BOARD ===== */
function init() {
  for (let r = 0; r < SIZE; r++) {
    board[r] = [];
    for (let c = 0; c < SIZE; c++) {
      board[r][c] = String.fromCharCode(65 + Math.floor(Math.random() * 26));
    }
  }

  WORDS.forEach(word => {
    const r = Math.floor(Math.random() * SIZE);
    for (let i = 0; i < word.length; i++) {
      if (i < SIZE) board[r][i] = word[i];
    }
    placed.push({ word, found: false });
  });
}

/* ===== RENDER ===== */
function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let r = 0; r < SIZE; r++) {
