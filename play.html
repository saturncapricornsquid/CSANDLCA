<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Team Wordsearch</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1a1a1a, #0c0d10);
      color: #ffffff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* LANDING */
    #landing {
      text-align: center;
      max-width: 320px;
    }

    #landing h1 {
      font-size: 42px;
      margin-bottom: 28px;
      color: #E60000; /* Vodafone red */
    }

    #landing button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 800;
      border-radius: 32px;
      border: none;
      background: #E60000;
      color: #ffffff;
      cursor: pointer;
    }

    /* GAME */
    #game {
      display: none;
      width: 100%;
      max-width: 640px;
      padding: 16px;
    }

    .card {
      background: #14161a;
      border: 1px solid #24262b;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #101217;
      border: 1px solid #24262b;
      font-weight: 800;
      user-select: none;
    }
  </style>
</head>

<body>

  <!-- LANDING SCREEN -->
  <div id="landing">
    <h1>Team Wordsearch</h1>
    <button id="enterBtn">Enter Game</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game">
    <div class="card">
      <strong>Wordsearch</strong>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    // Simple, safe JS (no dependencies)

    const enterBtn = document.getElementById("enterBtn");
    const landing = document.getElementById("landing");
    const game = document.getElementById("game");
    const grid = document.getElementById("grid");

    enterBtn.addEventListener("click", () => {
      landing.style.display = "none";
      game.style.display = "block";
      buildGrid();
    });

    function buildGrid() {
      const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      grid.innerHTML = "";
      for (let i = 0; i < 100; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = letters[Math.floor(Math.random() * letters.length)];
        grid.appendChild(cell);
      }
    }
  </script>

</body>
</html>
